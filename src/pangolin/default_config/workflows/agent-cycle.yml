name: agent-cycle

# Pangolin conversational cycle. Runs the full research → ingest → thinking →
# writing → self-improve → PR pipeline. Owner-triggered (manual dispatch) or
# scheduled — uncomment the cron line below to enable.
#
# All orchestration logic lives in the pangolin package (installed via pip).
# This workflow only sets up the environment and invokes `pangolin run`.

on:
  # schedule:
  #   - cron: "0 5-21 * * *"
  workflow_dispatch: {}

concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Egress filtering
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          # Runtime-only surface: Anthropic, GitHub, GHCR for agent images,
          # PyPI for pangolin + its deps, gVisor's repo for runsc install.
          allowed-endpoints: >
            api.anthropic.com:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            gvisor.dev:443
            storage.googleapis.com:443
            ghcr.io:443

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase repo owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Install gVisor
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull pre-built agent images from GHCR
        run: |
          docker pull ghcr.io/nila-loeber/pangolin-agent-bash:latest
          docker pull ghcr.io/nila-loeber/pangolin-agent-llm:latest
          docker tag ghcr.io/nila-loeber/pangolin-agent-bash:latest pangolin-agent-bash:latest
          docker tag ghcr.io/nila-loeber/pangolin-agent-llm:latest pangolin-agent-llm:latest

      - name: Install pangolin
        run: pip install --quiet git+https://github.com/Nila-Loeber/pangolin.git@v0.1

      - name: Setup git identity
        run: |
          git config user.name "cycle-agent"
          git config user.email "cycle-agent@users.noreply.github.com"

      - name: Run cycle
        env:
          # OAuth subscription token. If set, orchestrator routes every
          # agent call through the gVisor-sandboxed container.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Legacy API-key auth. Fallback when OAuth is unset.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pangolin run

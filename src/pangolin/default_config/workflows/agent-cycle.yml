name: agent-cycle

# Thin shim: all behavior lives in the `pangolin` pip package. Only the
# `env.PANGOLIN_REF` below pins behavior — it's used for BOTH the pip
# install ref AND the GHCR image tag, so agent-image + orchestrator
# always match. Bump PANGOLIN_REF to deploy a new version.
#
# - `main` (continuous): pip @main + docker :latest. Always tracks upstream.
#   Good for test/canary wikis, risky for prod because upstream rebuilds
#   hit you immediately.
# - `<commit-sha>` (pinned): pip @<sha> + docker :<sha>. Pin to a SHA
#   you've validated on a canary; prod wiki stays on that SHA until you
#   explicitly bump it.

on:
  # schedule:
  #   - cron: "0 5-21 * * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Verbose: full docker cmd + untruncated agent output + claude CLI --verbose"
        required: false
        default: false
        type: boolean

concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

env:
  PANGOLIN_REF: main

jobs:
  # Cheap precheck: skip the heavy cycle-setup (gVisor, image pulls, pip
  # install, proxy harden) if there's nothing to work on. Empty-queue runs
  # used to burn ~3 min of GH-Actions budget for nothing. ~10 s now.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      has_work: ${{ steps.check.outputs.has_work }}
    steps:
      - name: Check queue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          has_work="false"
          reason=""

          # manual_dispatch = always run (owner clicked, respect it).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            has_work="true"
            reason="manual workflow_dispatch"
          fi

          # (1) open mode:* tickets — each is a direct task. `inbox` is
          # intentionally NOT in this list: the inbox ticket is a permanent
          # sentinel that always carries the label; new work there is signalled
          # by new comments, not by the label itself (see step 2).
          if [ "$has_work" = "false" ]; then
            for label in mode:research mode:thinking mode:writing mode:software mode:self-improve; do
              n=$(gh issue list --repo "$REPO" --state open --label "$label" --json number --jq length 2>/dev/null || echo 0)
              if [ "$n" -gt 0 ]; then
                has_work="true"
                reason="$n open issue(s) with label=$label"
                break
              fi
            done
          fi

          # (2) new inbox comments since the sentinel watermark.
          # Watermark = last ISO-timestamp comment on the cycle-state issue.
          if [ "$has_work" = "false" ]; then
            sentinel=$(gh issue list --repo "$REPO" --state open --label cycle-state --limit 1 --json number --jq '.[0].number // empty')
            if [ -n "$sentinel" ]; then
              watermark=$(gh api "repos/$REPO/issues/$sentinel/comments" \
                --jq '[.[] | select(.body | test("^2[0-9]{3}-[0-9]"))] | last // empty | .body' 2>/dev/null || echo "")
              watermark="${watermark:-1970-01-01T00:00:00Z}"
              latest=$(gh issue list --repo "$REPO" --state open --label inbox \
                --json comments --jq '[.[] | .comments[]? | .createdAt] | max // empty' 2>/dev/null)
              latest="${latest:-1970-01-01T00:00:00Z}"
              if [ "$latest" \> "$watermark" ]; then
                has_work="true"
                reason="new inbox comment ($latest > $watermark)"
              fi
            fi
          fi

          # (3) owner comments on open agent-authored PRs (pr_feedback trigger).
          # Count comments whose body does NOT contain the AGENT_MARKER —
          # those are owner-authored. If any open agent-PR has such comments,
          # pr_feedback has something to look at.
          if [ "$has_work" = "false" ]; then
            prs=$(gh pr list --repo "$REPO" --state open --search "pangolin:auto in:body" --json number --jq '.[].number' 2>/dev/null || echo "")
            for pr in $prs; do
              oc=$(gh pr view "$pr" --repo "$REPO" --json comments \
                --jq '[.comments[] | select(.body | contains("<!-- pangolin:auto -->") | not)] | length' 2>/dev/null || echo 0)
              if [ "$oc" -gt 0 ]; then
                has_work="true"
                reason="$oc owner comment(s) on open agent-PR #$pr"
                break
              fi
            done
          fi

          echo "has_work=$has_work  reason: ${reason:-empty queue, no new inbox comments, no owner comments on agent-PRs}"
          echo "has_work=$has_work" >> "$GITHUB_OUTPUT"

  cycle:
    needs: precheck
    if: needs.precheck.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    # Job-level env: every step sees these in os.environ automatically.
    # Per-step env blocks are a foot-gun — a new step that forgets to
    # copy the block silently drops secrets. That exact bug shipped for
    # `pangolin harden-egress`: the proxy started with no OAuth token
    # and Anthropic rejected every request. Job-level scope makes the
    # class of bug structurally impossible.
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gVisor + pull agent images + install pangolin
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          if [ "$PANGOLIN_REF" = "main" ]; then IMG_TAG=latest; else IMG_TAG=$PANGOLIN_REF; fi
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          for img in pangolin-agent-bash pangolin-agent-llm pangolin-agent-software pangolin-egress-proxy; do
            docker pull ghcr.io/nila-loeber/$img:$IMG_TAG
            docker tag ghcr.io/nila-loeber/$img:$IMG_TAG $img:latest
          done
          pip install --quiet git+https://github.com/Nila-Loeber/pangolin.git@$PANGOLIN_REF
          git config user.name "cycle-agent"
          git config user.email "cycle-agent@users.noreply.github.com"

      - name: Harden egress + run cycle
        run: pangolin cycle ${{ inputs.verbose && '--verbose' || '' }}

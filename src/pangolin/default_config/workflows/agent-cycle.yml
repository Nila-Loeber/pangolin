name: agent-cycle

# Thin shim: all behavior lives in the `pangolin` pip package. Updates
# happen atomically when the package version below changes — wiki repos
# do not mirror orchestration logic. Only this shim is checked in.
#
# To upgrade behavior: bump the `@<ref>` in the `pip install` line below
# (or pin to @main for continuous deployment).

on:
  # schedule:
  #   - cron: "0 5-21 * * *"
  workflow_dispatch: {}

concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gVisor + pull agent images + install pangolin
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          for img in pangolin-agent-bash pangolin-agent-llm pangolin-agent-software pangolin-egress-proxy; do
            docker pull ghcr.io/nila-loeber/$img:latest
            docker tag ghcr.io/nila-loeber/$img:latest $img:latest
          done
          pip install --quiet git+https://github.com/Nila-Loeber/pangolin.git@main
          git config user.name "cycle-agent"
          git config user.email "cycle-agent@users.noreply.github.com"

      - name: Harden egress (proxy + iptables)
        run: pangolin harden-egress

      - name: Run cycle
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pangolin run

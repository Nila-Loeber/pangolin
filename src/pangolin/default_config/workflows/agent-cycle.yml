name: agent-cycle

# Pangolin conversational cycle. Runs the full research → ingest → thinking →
# writing → self-improve → PR pipeline. Owner-triggered (manual dispatch) or
# scheduled — uncomment the cron line below to enable.
#
# All orchestration logic lives in the pangolin package (installed via pip).
# This workflow only sets up the environment and invokes `pangolin run`.

on:
  # schedule:
  #   - cron: "0 5-21 * * *"
  workflow_dispatch: {}

concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      # Egress filtering is self-hosted: the pangolin-egress-proxy sidecar
      # (started below) enforces the hostname allowlist via squid dstdomain,
      # and host iptables pins all outbound to that proxy (defense-in-depth).

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase repo owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Install gVisor
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull pre-built agent + infra images from GHCR
        run: |
          for img in pangolin-agent-bash pangolin-agent-llm pangolin-agent-software pangolin-egress-proxy; do
            docker pull ghcr.io/nila-loeber/$img:latest
            docker tag ghcr.io/nila-loeber/$img:latest $img:latest
          done

      - name: Install pangolin
        run: pip install --quiet git+https://github.com/Nila-Loeber/pangolin.git@v0.1

      - name: Setup git identity
        run: |
          git config user.name "cycle-agent"
          git config user.email "cycle-agent@users.noreply.github.com"

      - name: Start egress proxy sidecar
        # Bring the squid forward proxy up early so the iptables bootstrap
        # step below can discover its IP. _ensure_proxy_running() in
        # orchestrate.py is idempotent — it will see this container and
        # reuse it instead of starting its own.
        run: |
          docker network create pangolin-net 2>/dev/null || true
          docker run -d --rm \
            --name pangolin-egress-proxy \
            --network pangolin-net \
            pangolin-egress-proxy:latest
          # Give squid a moment to bind its sockets.
          for i in 1 2 3 4 5; do
            docker exec pangolin-egress-proxy sh -c 'nc -z 127.0.0.1 3128' 2>/dev/null && break
            sleep 1
          done

      - name: Lock host egress to proxy (iptables bootstrap)
        # Defense-in-depth: the proxy already enforces a hostname allowlist.
        # This step ensures no host process can bypass it — host outbound to
        # external IPs is REJECTed; only Docker-internal nets (where the
        # proxy lives) and DNS are reachable. The proxy's own outbound goes
        # through Docker's FORWARD chain, which is unaffected by these
        # OUTPUT rules.
        run: |
          PROXY_IP=$(docker inspect pangolin-egress-proxy \
            -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}')
          echo "proxy IP: $PROXY_IP"
          sudo iptables -I OUTPUT 1 -m state --state ESTABLISHED,RELATED -j ACCEPT
          sudo iptables -I OUTPUT 2 -o lo -j ACCEPT
          # Docker bridge networks (172.16.0.0/12): covers default bridge
          # and user-defined networks (pangolin-net). Proxy lives here.
          sudo iptables -A OUTPUT -d 172.16.0.0/12 -j ACCEPT
          # GH Actions runner-local (private net), link-local metadata.
          sudo iptables -A OUTPUT -d 10.0.0.0/8 -j ACCEPT
          sudo iptables -A OUTPUT -d 169.254.0.0/16 -j ACCEPT
          # DNS for host `gh` + resolver use.
          sudo iptables -A OUTPUT -p udp --dport 53 -j ACCEPT
          sudo iptables -A OUTPUT -p tcp --dport 53 -j ACCEPT
          sudo iptables -A OUTPUT -j REJECT
          # Route host processes (gh, pip if it runs, anthropic SDK in the
          # API-key fallback path) through the proxy.
          echo "HTTPS_PROXY=http://$PROXY_IP:3128" >> $GITHUB_ENV
          echo "HTTP_PROXY=http://$PROXY_IP:3128" >> $GITHUB_ENV
          echo "NO_PROXY=localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8" >> $GITHUB_ENV

      - name: Run cycle
        env:
          # OAuth subscription token. If set, orchestrator routes every
          # agent call through the gVisor-sandboxed container.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Legacy API-key auth. Fallback when OAuth is unset.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pangolin run

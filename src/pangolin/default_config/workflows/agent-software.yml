name: agent-software

# Pangolin software-mode runner. Picks one `mode:software` issue, creates a
# feature branch, runs the agent with edit tools, commits, opens a PR.
#
# All orchestration logic lives in the pangolin package. This workflow only
# sets up the environment and invokes `pangolin software`.

on:
  # schedule:
  #   - cron: "30 5-21 * * *"
  workflow_dispatch: {}

concurrency:
  group: agent-software
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  software-task:
    runs-on: ubuntu-latest
    steps:
      - name: Egress filtering
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.anthropic.com:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443
            pypi.org:443
            files.pythonhosted.org:443
            gvisor.dev:443
            storage.googleapis.com:443
            ghcr.io:443

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase repo owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Install gVisor
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull pre-built agent images from GHCR
        run: |
          docker pull ghcr.io/nila-loeber/pangolin-agent:latest
          docker pull ghcr.io/nila-loeber/pangolin-agent-epic8:latest
          docker tag ghcr.io/nila-loeber/pangolin-agent:latest pangolin-agent:latest
          docker tag ghcr.io/nila-loeber/pangolin-agent-epic8:latest pangolin-agent-epic8:latest

      - name: Install pangolin
        run: pip install --quiet git+https://github.com/Nila-Loeber/pangolin.git@v0.1

      - name: Setup git identity
        run: |
          git config user.name "software-agent"
          git config user.email "software-agent@users.noreply.github.com"

      - name: Run software task
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pangolin software

# Mode definitions for Secure Conversational LLM Workflows.
#
# Each Mode is a named permission profile. tools.py enforces
# allowed_tools + readable/writable_paths. modes.py validates invariants.
#
# Invariants (modes.py _validate_invariants):
#   - trust_level: untrusted implies code_execution: false
#   - trust_level: untrusted implies quarantine_output is set
#   - readable_paths and writable_paths must be non-empty
#   - writable_paths must be a subset of readable_paths (a writable path is
#     implicitly readable)
#
# Field reference:
#   description:       free text, purpose of the Mode
#   network:           bool — container network access
#   code_execution:    bool — may the agent run arbitrary code
#   allowed_tools:     list — tool categories the agent may use (soft)
#   denied_tools:      list — tool categories the agent must not use (soft)
#   readable_paths:    list — dirs/globs the agent can read (hard, mounts)
#   writable_paths:    list — dirs/globs the agent can write (hard, mounts)
#   gh_cli:            bool — whether a GitHub token is mounted
#   autonomy:          low|medium|high — documentation, not enforced
#   trust_level:       trusted|untrusted — does this Mode process untrusted input?
#   quarantine_output: path — required when trust_level is untrusted
#   provider:          anthropic|scaleway — which LLM provider to use
#   model:             model identifier for the provider
#   execution:         container|direct — container for tool-calling agents,
#                      direct for json-schema agents (no container needed)
#   container_runtime: runsc — gVisor runtime for container Modes. Provides
#                      userspace syscall interception (subsumes seccomp-bpf)
#   egress:            tight|loose — which egress-proxy port this mode uses.
#                      tight = Anthropic+GitHub+PyPI+etc. allowlist (default).
#                      loose = any HTTPS (only for broad-outbound use cases;
#                      no mode currently requires this — phase-1 search is
#                      hardcoded in orchestrate.py and sets loose directly).

modes:

  software:
    description: "Write code, run tests, tooling, scripts — workflow manages git/gh"
    provider: anthropic
    model: claude-opus-4-7
    execution: container
    container_runtime: runsc
    network: false
    code_execution: true
    allowed_tools: [read, write, edit, glob, bash]
    denied_tools: [web_search, web_fetch]
    readable_paths: [src/, tests/, scripts/, docs/]
    writable_paths: [src/, tests/, scripts/]
    gh_cli: false
    autonomy: medium
    trust_level: trusted
    egress: tight

  research:
    description: "Phase-2 summariser: receives search results (untrusted), returns structured findings JSON"
    provider: anthropic
    model: claude-sonnet-4-6
    execution: direct
    network: false
    code_execution: false
    # Epic 9 phase-split: research is now two phases.
    # Phase 1 ("search"): in-process SDK + WebSearch server tool, trusted input
    #   (owner's issue body). Runs on the host, not in a container. Hardcoded
    #   in orchestrate.py::_run_search_phase(), no mode entry needed.
    # Phase 2 ("summarise"): this mode. Direct agent, json-schema, no tools.
    #   Receives search results (untrusted web content) and produces structured
    #   findings. Token stays on host. Trifecta broken: (b)+(c) missing.
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash, web_search, web_fetch]
    readable_paths: [wiki/, notes/]
    writable_paths: []
    gh_cli: false
    autonomy: high
    trust_level: untrusted
    quarantine_output: wiki/fragment/
    json_schema: research
    egress: tight

  thinking:
    description: "Analysis, synthesis, structuring, cross-links — json-schema output (also used by wiki-ingest phase)"
    provider: anthropic
    # Sonnet for the speed/quality sweet spot on direct json-schema modes:
    # one API call, no iteration, response generation dominates wall time.
    # Sonnet is ~2× faster than Opus on equivalent prose-synthesis tasks
    # while still high-quality enough for wiki/notes ingestion.
    # Override via PANGOLIN_MODELS if a heavy synthesis run wants Opus.
    model: claude-sonnet-4-6
    execution: direct
    network: false
    code_execution: false
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash, web_search, web_fetch]
    # Host loads context (relevant pages) into the prompt; agent returns JSON
    # with writes; host applies them with path-scope validation.
    readable_paths: [wiki/, notes/, drafts/, .ingest-watermark]
    writable_paths: [wiki/, notes/, drafts/, .ingest-watermark]
    gh_cli: false
    autonomy: low
    trust_level: trusted
    json_schema: thinking
    egress: tight

  writing:
    description: "Produce prose drafts: json-schema output, executor writes files"
    provider: anthropic
    # Sonnet for direct json-schema speed (see thinking-mode rationale).
    # Drafts are rough-cut prose anyway — owner edits for tone post-merge.
    model: claude-sonnet-4-6
    execution: direct
    network: false
    code_execution: false
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash, web_search, web_fetch]
    # Readable: orchestrator pulls relevant context (existing draft, related wiki
    # pages) into the prompt — agent doesn't read files itself anymore.
    readable_paths: [drafts/, content/, wiki/, notes/]
    writable_paths: [drafts/, content/]
    gh_cli: false
    autonomy: medium
    trust_level: trusted
    json_schema: writing
    egress: tight

  triage:
    description: "Inbox triage: json-schema output, the executor makes the gh calls"
    provider: anthropic
    model: claude-sonnet-4-6
    execution: direct
    network: false
    code_execution: false
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash]
    # .inbox-watermark was a file-based cursor; since the sentinel-issue
    # refactor the watermark lives in a GitHub issue comment, so it's
    # no longer a path that needs mounting.
    readable_paths: [wiki/, notes/]
    writable_paths: [notes/ideas/]
    gh_cli: false
    autonomy: medium
    trust_level: trusted
    json_schema: triage
    egress: tight

  summary:
    description: "Cycle summary: json-schema output, the executor posts comments"
    provider: anthropic
    model: claude-haiku-4-5-20251001
    execution: direct
    network: false
    code_execution: false
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash]
    readable_paths: [wiki/, notes/, drafts/]
    writable_paths: [notes/ideas/]
    gh_cli: false
    autonomy: low
    trust_level: trusted
    json_schema: summary
    egress: tight

  self-improve:
    description: "Self-reflection: json-schema output, the workflow writes the edited files"
    provider: anthropic
    model: claude-sonnet-4-6
    execution: direct
    network: false
    code_execution: false
    allowed_tools: []
    denied_tools: [read, write, edit, glob, grep, bash]
    readable_paths: [docs/]
    writable_paths: [docs/]
    gh_cli: false
    autonomy: low
    trust_level: trusted
    json_schema: self-improve
    egress: tight

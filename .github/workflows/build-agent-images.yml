name: build-agent-images

# Builds the agent + infra images and pushes them to GHCR:
#   pangolin-agent-bash     — Python+bash, no network. Bash tool sandbox
#                             for the in-process SDK / API-key fallback path.
#   pangolin-agent-llm      — Node + claude CLI, no bash. Default agent image
#                             for all non-software modes (OAuth path).
#   pangolin-agent-software — Node + claude CLI + bash. Used only by the
#                             software mode under the OAuth path.
#   pangolin-egress-proxy   — Squid forward proxy with per-port hostname
#                             allowlists. Sidecar required by all agent calls.
# Runs on Containerfile changes or manual dispatch.
# Decouples build-time egress surface (npm, Alpine, Docker Hub) from the
# runtime workflows — those only need api.anthropic.com + ghcr.io.

on:
  push:
    branches: [main]
    paths:
      - Containerfile.bash
      - Containerfile.llm
      - Containerfile.software
      - Containerfile.egress
      - .github/workflows/build-agent-images.yml
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Egress filtering
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          # Build-time egress surface — npm + Alpine + Docker Hub + GHCR +
          # GHA cache. Deliberately wider than the runtime workflows.
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            dl-cdn.alpinelinux.org:443
            registry.npmjs.org:443
            ghcr.io:443
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - uses: actions/checkout@v4

      - name: Lowercase repo owner for GHCR
        # GHCR requires lowercase image names; github.repository_owner keeps
        # the original case ("Nila-Loeber"). Bash parameter expansion ${VAR,,}
        # lowercases.
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push pangolin-agent-bash
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.bash
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-bash:latest
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-bash:${{ github.sha }}
          cache-from: type=gha,scope=pangolin-agent-bash
          cache-to: type=gha,scope=pangolin-agent-bash,mode=max

      - name: Build + push pangolin-agent-llm
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.llm
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-llm:latest
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-llm:${{ github.sha }}
          cache-from: type=gha,scope=pangolin-agent-llm
          cache-to: type=gha,scope=pangolin-agent-llm,mode=max

      - name: Build + push pangolin-agent-software
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.software
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-software:latest
            ghcr.io/${{ env.OWNER_LC }}/pangolin-agent-software:${{ github.sha }}
          cache-from: type=gha,scope=pangolin-agent-software
          cache-to: type=gha,scope=pangolin-agent-software,mode=max

      - name: Build + push pangolin-egress-proxy
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile.egress
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/pangolin-egress-proxy:latest
            ghcr.io/${{ env.OWNER_LC }}/pangolin-egress-proxy:${{ github.sha }}
          cache-from: type=gha,scope=pangolin-egress-proxy
          cache-to: type=gha,scope=pangolin-egress-proxy,mode=max

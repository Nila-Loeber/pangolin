name: agent-cycle

# Sandburg orchestrator. All logic lives in scripts/sandburg/.
# This workflow is a thin wrapper that sets up the environment and
# calls orchestrate.py.

on:
  # schedule:
  #   - cron: "0 5-21 * * *"  # uncomment when ready to use
  workflow_dispatch: {}

concurrency:
  group: agent-cycle
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Egress filtering
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          # Runtime-only surface: talk to Anthropic, GitHub, GHCR for images,
          # PyPI for the two Python deps, gVisor's repo + storage for the
          # runsc install. No Docker Hub / npm / Alpine mirror — those are
          # build-time endpoints and only the separate build workflow has them.
          allowed-endpoints: >
            api.anthropic.com:443
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            gvisor.dev:443
            storage.googleapis.com:443
            ghcr.io:443

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lowercase repo owner for GHCR
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Install gVisor
        run: |
          curl -fsSL https://gvisor.dev/archive.key | sudo gpg --dearmor -o /usr/share/keyrings/gvisor.gpg
          echo "deb [signed-by=/usr/share/keyrings/gvisor.gpg] https://storage.googleapis.com/gvisor/releases release main" \
            | sudo tee /etc/apt/sources.list.d/gvisor.list
          sudo apt-get update -qq && sudo apt-get install -y -qq runsc
          sudo runsc install && sudo systemctl reload docker

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull pre-built agent images from GHCR
        run: |
          docker pull ghcr.io/${{ env.OWNER_LC }}/sandburg-agent:latest
          docker pull ghcr.io/${{ env.OWNER_LC }}/sandburg-agent-epic8:latest
          # Retag so local code references (sandburg-agent, sandburg-agent-epic8) resolve.
          docker tag ghcr.io/${{ env.OWNER_LC }}/sandburg-agent:latest sandburg-agent:latest
          docker tag ghcr.io/${{ env.OWNER_LC }}/sandburg-agent-epic8:latest sandburg-agent-epic8:latest

      - name: Setup
        run: |
          git config user.name "cycle-agent"
          git config user.email "cycle-agent@users.noreply.github.com"
          pip install anthropic pyyaml -q

      - name: Run cycle
        env:
          # OAuth subscription token. If set, orchestrator routes every
          # agent call through the Epic-8 gVisor-sandboxed container.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Legacy API-key auth. If OAuth is unset, orchestrator falls back
          # to the in-process SDK path using this.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sandburg/orchestrate.py

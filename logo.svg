<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sandburg logo">
  <defs>
    <!-- Ghost crab: sand-colored, subtle, lives IN the castle -->
    <symbol id="crab" viewBox="0 0 7 5">
      <circle cx="0.8" cy="1.2" r="0.9" fill="#b8a07a"/>
      <circle cx="6.2" cy="1.2" r="0.9" fill="#b8a07a"/>
      <ellipse cx="3.5" cy="2.6" rx="2.4" ry="1.4" fill="#b8a07a"/>
      <!-- Dark eyes — ghost crabs have prominent stalked eyes -->
      <circle cx="2.4" cy="1.8" r="0.5" fill="#2d2a26"/>
      <circle cx="4.6" cy="1.8" r="0.5" fill="#2d2a26"/>
      <rect x="1.4" y="3.9" width="0.6" height="0.8" fill="#b8a07a"/>
      <rect x="3.2" y="4.1" width="0.6" height="0.8" fill="#b8a07a"/>
      <rect x="5" y="3.9" width="0.6" height="0.8" fill="#b8a07a"/>
    </symbol>

    <!-- Peeking ghost crab — top half, big dark eyes on sand body -->
    <symbol id="crab-peek" viewBox="0 0 7 3">
      <circle cx="0.8" cy="1.2" r="0.8" fill="#b8a07a"/>
      <circle cx="6.2" cy="1.2" r="0.8" fill="#b8a07a"/>
      <path d="M 1 2.2 Q 3.5 0.9 6 2.2 L 6 3 L 1 3 Z" fill="#b8a07a"/>
      <!-- Big dark eyes — the signature ghost crab feature -->
      <circle cx="2.4" cy="1.6" r="0.45" fill="#2d2a26"/>
      <circle cx="4.6" cy="1.6" r="0.45" fill="#2d2a26"/>
    </symbol>
  </defs>

  <!-- Flag pole -->
  <rect x="31.25" y="6" width="1" height="12" fill="#2d2a26"/>
  <!-- Flag -->
  <path d="M 32.25 7 L 40 10 L 32.25 13 Z" fill="#c1440e"/>

  <g fill="#d4a373">
    <!-- Base -->
    <rect x="5" y="42" width="54" height="14"/>
    <!-- Left tower -->
    <rect x="5" y="30" width="14" height="12"/>
    <!-- Right tower -->
    <rect x="45" y="30" width="14" height="12"/>
    <!-- Center tower -->
    <rect x="24" y="18" width="16" height="24"/>

    <!-- Crenellations — center -->
    <rect x="24" y="14" width="3" height="4"/>
    <rect x="30" y="14" width="4" height="4"/>
    <rect x="37" y="14" width="3" height="4"/>
    <!-- Crenellations — left -->
    <rect x="5" y="26" width="3" height="4"/>
    <rect x="10.5" y="26" width="3" height="4"/>
    <rect x="16" y="26" width="3" height="4"/>
    <!-- Crenellations — right -->
    <rect x="45" y="26" width="3" height="4"/>
    <rect x="50.5" y="26" width="3" height="4"/>
    <rect x="56" y="26" width="3" height="4"/>
  </g>

  <!-- Shadow for depth -->
  <g fill="#a67c52" opacity="0.5">
    <rect x="37" y="18" width="3" height="24"/>
    <rect x="16" y="30" width="3" height="12"/>
    <rect x="56" y="30" width="3" height="12"/>
    <rect x="5" y="54" width="54" height="2"/>
  </g>

  <!-- Arched door -->
  <path d="M 28 56 L 28 44 Q 28 40 32 40 Q 36 40 36 44 L 36 56 Z" fill="#5a3a22"/>

  <!-- ═══ GHOST CRAB AGENTS ═══ -->

  <!-- Crab 1: peeking out of the door (just eyes + claws) -->
  <use href="#crab-peek" x="28.5" y="44" width="7" height="3"/>

  <!-- Crab 2: peeking out of left-tower window -->
  <use href="#crab-peek" x="8.5" y="34" width="7" height="3"/>

  <!-- Crab 3: peeking out of right-tower window -->
  <use href="#crab-peek" x="48.5" y="34" width="7" height="3"/>

  <!-- Crab 4: on top of center tower, lookout next to flag -->
  <use href="#crab" x="33" y="9.5" width="5" height="3.6"/>

  <!-- Crab 5: walking on base, left -->
  <use href="#crab" x="18" y="49" width="6" height="4.3"/>

  <!-- Crab 6: walking on base, right -->
  <use href="#crab" x="42" y="50" width="5.5" height="3.9"/>

  <!-- Ground line -->
  <rect x="2" y="57" width="60" height="1.5" fill="#8b5a2b" opacity="0.6"/>
</svg>

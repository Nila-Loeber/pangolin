<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 48" role="img" aria-label="Pangolin logo">
  <!-- Soft ground shadow -->
  <ellipse cx="36" cy="44" rx="30" ry="1.8" fill="#8b5a2b" opacity="0.25"/>

  <!-- Long tail (pangolin tails are almost as long as the body) -->
  <path d="M 48 32
           Q 60 30 66 34
           Q 70 36 68 40
           Q 64 42 58 40
           Q 52 38 48 36 Z"
        fill="#c89a6b"/>

  <!-- Main torso -->
  <path d="M 14 32
           Q 10 28 12 22
           Q 16 16 26 14
           Q 40 12 50 16
           Q 56 20 54 28
           Q 52 32 48 34
           L 14 34 Z"
        fill="#d4a373"/>

  <!-- Head + long tubular snout on the left -->
  <path d="M 14 32
           Q 8 30 4 26
           Q 2 22 4 20
           Q 8 18 12 20
           Q 16 22 18 26 Z"
        fill="#c89a6b"/>
  <!-- Snout tip (narrower, more tubular) -->
  <ellipse cx="3" cy="22" rx="2.5" ry="1.2" fill="#a67c52"/>
  <!-- Eye -->
  <circle cx="12" cy="21" r="1" fill="#2d2a26"/>

  <!-- Front leg (short, stubby) -->
  <rect x="18" y="33" width="3" height="4" rx="1" fill="#c89a6b"/>
  <!-- Back leg -->
  <rect x="42" y="33" width="3" height="4" rx="1" fill="#c89a6b"/>

  <!-- Scales: rounded overlapping tiles (artichoke-like) -->
  <!-- Shadow layer -->
  <g fill="#a67c52">
    <!-- Row 1 (along back ridge) -->
    <path d="M 22 18 Q 26 14 30 18 Q 26 22 22 18 Z"/>
    <path d="M 28 18 Q 32 14 36 18 Q 32 22 28 18 Z"/>
    <path d="M 34 18 Q 38 14 42 18 Q 38 22 34 18 Z"/>
    <path d="M 40 18 Q 44 14 48 18 Q 44 22 40 18 Z"/>

    <!-- Row 2 (offset) -->
    <path d="M 19 23 Q 23 19 27 23 Q 23 27 19 23 Z"/>
    <path d="M 25 23 Q 29 19 33 23 Q 29 27 25 23 Z"/>
    <path d="M 31 23 Q 35 19 39 23 Q 35 27 31 23 Z"/>
    <path d="M 37 23 Q 41 19 45 23 Q 41 27 37 23 Z"/>
    <path d="M 43 23 Q 47 19 51 23 Q 47 27 43 23 Z"/>

    <!-- Row 3 (offset back) -->
    <path d="M 22 28 Q 26 24 30 28 Q 26 32 22 28 Z"/>
    <path d="M 28 28 Q 32 24 36 28 Q 32 32 28 28 Z"/>
    <path d="M 34 28 Q 38 24 42 28 Q 38 32 34 28 Z"/>
    <path d="M 40 28 Q 44 24 48 28 Q 44 32 40 28 Z"/>

    <!-- Tail scales -->
    <path d="M 52 33 Q 55 31 58 33 Q 55 35 52 33 Z"/>
    <path d="M 58 35 Q 61 33 64 35 Q 61 37 58 35 Z"/>
    <path d="M 62 37 Q 65 35 67 37 Q 65 39 62 37 Z"/>
  </g>

  <!-- Highlight on top edge of each scale (thin arc) -->
  <g stroke="#e8c595" stroke-width="0.6" fill="none" opacity="0.7">
    <!-- Row 1 highlights -->
    <path d="M 24 17 Q 26 15 28 17"/>
    <path d="M 30 17 Q 32 15 34 17"/>
    <path d="M 36 17 Q 38 15 40 17"/>
    <path d="M 42 17 Q 44 15 46 17"/>
    <!-- Row 2 -->
    <path d="M 21 22 Q 23 20 25 22"/>
    <path d="M 27 22 Q 29 20 31 22"/>
    <path d="M 33 22 Q 35 20 37 22"/>
    <path d="M 39 22 Q 41 20 43 22"/>
    <path d="M 45 22 Q 47 20 49 22"/>
    <!-- Row 3 -->
    <path d="M 24 27 Q 26 25 28 27"/>
    <path d="M 30 27 Q 32 25 34 27"/>
    <path d="M 36 27 Q 38 25 40 27"/>
    <path d="M 42 27 Q 44 25 46 27"/>
  </g>
</svg>
